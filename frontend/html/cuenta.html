<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <title>Cuenta</title>
</head>
<body>
    <header>
        <h1>MOK</h1>
    </header>
    
     <main>
        <h2 class="titulo-cuenta">Mi Cuenta</h2>

        <div class="contenedor-cuenta" id="sinSesion">

            <div class="icono-cuenta">
                <img src="../img/cuenta.png" alt="Cuenta">
            </div>

            <h2 class="titulo-cuenta">Mi Cuenta</h2>

            <p class="descripcion-cuenta">
                Guardá tus outfits favoritos,
                organizá tu armario y creá
                combinaciones únicas.
            </p>

            <a href="iniciarsesion.html" class="boton-principal">
                Iniciar Sesión
            </a>

            <div class="separador">
                <span>o</span>
            </div>

            <p class="texto-crear">
                ¿Sos nuevo en MOK?
            </p>

            <a href="crearcuenta.html" class="link-crear">
                Crear Cuenta
            </a>
        </div>

        <div class="contenedor-cuenta" id="conSesion" style="display:none">
            <div class="icono-cuenta">
                <img src="../img/cuenta.png" alt="Cuenta">
            </div>

            <h2 class="titulo-cuenta">
                Hola <span id="nombreUsuario"></span> 💛
            </h2>

            <p class="descripcion-cuenta">
                Email:
                <span id="emailUsuario"></span>
            </p>

            <p class="descripcion-cuenta">
                Plan:
                <span id="planUsuario"></span>
            </p>

            <button id="cerrarSesion" class="boton-principal">Cerrar sesión</button>
        </div>
    </main>
    
    <footer>
        <nav>
            <div class="seccion">
                <a href="../index.html" class="icono">
                    <img src="../img/inicio.png" alt="Inicio">
                </a>
            </div>

            <div class="seccion">
                <a href="explorar.html" class="icono">
                    <img src="../img/explorar.png" alt="Explorar">
                </a>
            </div>

            <a href="crearoutfit.html" class="crear-outfit">+</a>

            <div class="seccion">
                <a href="armario.html" class="icono">
                    <img src="../img/armario.png" alt="Armario">
                </a>
            </div>

            <div class="seccion sin-linea">
                <a href="cuenta.html" class="icono">
                    <img src="../img/cuenta.png" alt="Cuenta">
                </a>
            </div>
        </nav>
    </footer>
    <script src="../js/cuenta.js"></script>
</body>
</html>
